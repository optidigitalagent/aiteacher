# Mentium Kids — Age Profiles: 6–7 vs 8–9
# Version: 1.0
# Classification: [A] Developmental psychology grounding | [B] Product-specific tuning

# ─────────────────────────────────────────────────────────────
# RATIONALE FOR SPLIT
# ─────────────────────────────────────────────────────────────
rationale: >
  Ages 6-7 and 8-9 differ significantly in:
  - Working memory capacity (7-8 items at age 8 vs 5-6 at age 6) [A]
  - Phonological processing maturity [A]
  - Metalinguistic awareness (ability to think about language) [A]
  - Self-regulation (frustration tolerance, sustained attention) [A]
  - Response to explicit instruction vs implicit exposure [A]
  - Reading ability (ages 6-7 are often pre/early readers; 8-9 more fluent)
  
  Both groups are pre-adolescent and benefit from playful, game-like instruction,
  short sessions, repetition, and emotional safety. The differences are of degree, not kind.
  
  [B] Exact threshold values below require empirical validation with target user cohort.

profiles:

  # ─────────────────────────────────────────────────────────────
  # AGE BAND: 6–7
  # ─────────────────────────────────────────────────────────────

  age_6_7:
    label: "Young Learners"
    age_band: "6-7"
    
    # ── TEACHER LANGUAGE ──────────────────────────────────────
    teacher_language:
      max_sentence_length_words: 7
      preferred_sentence_length_words: 4-5
      instruction_style: "direct_and_concrete"
      question_forms:
        - "What is this?"            # simple naming
        - "Is it a [X] or a [Y]?"    # forced choice preferred
        - "Can you say [X]?"         # explicit repetition invite
        - "Look! What do you see?"   # visual anchor
      forbidden_question_forms:
        - "Why do you think...?"     # too abstract
        - "Can you tell me more?"    # too open-ended
        - "What would happen if...?" # too hypothetical
      vocabulary_in_prompts: concrete_known_only
      use_of_child_name: frequent  # name-use increases attention [A]
      humor_type: simple_physical_or_animal  # "the dog says woof woof woof!"
    
    # ── TIMING ───────────────────────────────────────────────
    timing:
      wait_time_before_scaffold_ms: 4000  # allow extra thinking time [A]
      silence_short_threshold_ms: 3500    # extended from base
      silence_medium_threshold_ms: 5000
      silence_long_threshold_ms: 8000
      max_activity_duration_ms: 90000     # 90 seconds per activity type
      max_session_duration_ms: 900000     # 15 minutes
      recommended_session_duration_ms: 600000  # 10 minutes ideal
      inter_item_pause_ms: 800            # brief pause between items
    
    # ── ACTIVITY TYPES ───────────────────────────────────────
    allowed_activity_types:
      - flashcard_naming       # "What is this?"
      - forced_choice          # "Dog or cat?"
      - listen_and_point       # receptive only
      - repeat_after_me        # pure repetition
      - simple_chant           # rhythm-based repetition
      - action_song            # physical engagement
      - character_interaction  # teacher character plays
    
    forbidden_activity_types:
      - open_sentence_production  # "Tell me about your day" — too demanding
      - mini_story_reasoning      # "What happens next?" — too abstract
      - translation_quiz          # metalinguistic; too advanced
      - reading_tasks             # many in 6-7 are pre-readers
    
    # ── PRODUCTION EXPECTATIONS ──────────────────────────────
    production_expectations:
      default_demand: single_word_or_short_phrase
      max_demand: 2_words  # "big dog", "red cat"
      acceptable_production_types:
        - single_word
        - repetition_after_model
        - forced_choice_selection
        - pointing_or_action (non-verbal accepted)
      do_not_require:
        - grammatically_complete_sentences
        - unprompted_production_on_new_items
    
    # ── SCAFFOLDING ──────────────────────────────────────────
    scaffolding:
      modeling_frequency: high   # model first on new items by default
      model_before_attempt: true # for first exposure to any item
      repetitions_per_item: 3-4  # more than 8-9
      forced_choice_threshold: attempt_number >= 1  # offer choice quickly
      hint_style: visual_or_sound_based  # not abstract hints
    
    # ── RECOVERY THRESHOLDS ──────────────────────────────────
    recovery_thresholds:
      frustration_risk_threshold: 0.35   # lower threshold; escalate sooner
      silence_scaffold_threshold_ms: 4000
      failure_before_easiest_win: 2      # intervene sooner than 8-9
      l1_anchor_frequency: moderate      # acceptable more often
    
    # ── PRAISE STYLE ─────────────────────────────────────────
    praise_style:
      intensity: high                    # age 6-7 responds well to enthusiastic praise [A]
      specificity: medium                # "You said dog! Yes!"
      physical_celebration: yes          # character dances, stars explode
      frequency_cap: 4_consecutive       # fake_praise_guard after 4
      examples:
        - "Yes! Dog! Amazing!"
        - "Wow, you said it! Dog! So good!"
        - "That's right! Dog! Yes yes yes!"
    
    # ── L1 RESCUE ────────────────────────────────────────────
    l1_rescue:
      threshold: attempt_number >= 2 OR emotional_safety < 0.55
      method: l1_anchor_then_english_model
      max_per_item: 1
      
    # ── COGNITIVE LOAD MANAGEMENT ────────────────────────────
    cognitive_load:
      max_new_items_per_session: 4       # do not introduce more than 4 new items [A]
      new_to_review_ratio: "1:3"         # 1 new item per 3 review items
      working_memory_buffer: 5_items     # do not expect recall beyond 5 items in session

  # ─────────────────────────────────────────────────────────────
  # AGE BAND: 8–9
  # ─────────────────────────────────────────────────────────────

  age_8_9:
    label: "Developing Learners"
    age_band: "8-9"
    
    # ── TEACHER LANGUAGE ──────────────────────────────────────
    teacher_language:
      max_sentence_length_words: 12
      preferred_sentence_length_words: 7-9
      instruction_style: "guided_with_choice"
      question_forms:
        - "What is this?"
        - "What color is it?"
        - "Can you make a sentence with [X]?"  # sentence production allowed
        - "Why do you think so?"               # light reasoning
        - "What happens next in the story?"   # narrative inference
        - "Is it a [X] or something else?"
      forbidden_question_forms:
        - abstract_hypotheticals_requiring_extended_reasoning
      vocabulary_in_prompts: slightly_beyond_known  # comprehensible +1 [A]
      use_of_child_name: moderate
      humor_type: wordplay_and_mild_absurdity  # "a dog who eats pizza on the moon"
    
    # ── TIMING ───────────────────────────────────────────────
    timing:
      wait_time_before_scaffold_ms: 3000  # slightly less than 6-7
      silence_short_threshold_ms: 3000
      silence_medium_threshold_ms: 4500
      silence_long_threshold_ms: 7000
      max_activity_duration_ms: 120000    # 2 minutes per activity
      max_session_duration_ms: 1200000    # 20 minutes
      recommended_session_duration_ms: 900000  # 15 minutes
      inter_item_pause_ms: 600
    
    # ── ACTIVITY TYPES ───────────────────────────────────────
    allowed_activity_types:
      - flashcard_naming
      - forced_choice
      - listen_and_point
      - repeat_after_me
      - simple_chant
      - action_song
      - character_interaction
      - mini_story_with_prompts   # NEW for 8-9
      - sentence_completion       # NEW — "The dog is ___"
      - yes_no_questions          # NEW — "Is this a cat? Yes or no?"
      - simple_description        # NEW — "Tell me one thing about this"
    
    forbidden_activity_types:
      - extended_free_speaking    # still too advanced
      - formal_grammar_explanation
      - reading_heavy_tasks       # if not confirmed reader
    
    # ── PRODUCTION EXPECTATIONS ──────────────────────────────
    production_expectations:
      default_demand: word_or_short_phrase
      max_demand: simple_sentence  # "The dog is big"
      acceptable_production_types:
        - single_word
        - 2-3_word_phrase
        - simple_sentence_with_support
        - repetition_after_model
        - forced_choice_selection
      encourage_when_ready:
        - unprompted_word_production
        - sentence_completion
        - minimal_description
    
    # ── SCAFFOLDING ──────────────────────────────────────────
    scaffolding:
      modeling_frequency: moderate     # model on new items; allow attempt first on known
      model_before_attempt: false      # allow first attempt before modeling (for known items)
      repetitions_per_item: 2-3
      forced_choice_threshold: attempt_number >= 2  # try production first
      hint_style: semantic_or_phonological  # "It starts with D..."
    
    # ── RECOVERY THRESHOLDS ──────────────────────────────────
    recovery_thresholds:
      frustration_risk_threshold: 0.45   # slightly higher tolerance than 6-7
      silence_scaffold_threshold_ms: 3000
      failure_before_easiest_win: 3
      l1_anchor_frequency: lower         # less frequent; push for English more
    
    # ── PRAISE STYLE ─────────────────────────────────────────
    praise_style:
      intensity: medium                   # over-effusive praise feels fake to 8-9 [B]
      specificity: high                   # "You said a full sentence! 'The dog is big' — perfect!"
      physical_celebration: moderate      # less than 6-7
      frequency_cap: 5_consecutive
      examples:
        - "Yes! That's right!"
        - "Great sentence! 'The dog is big' — well done."
        - "You got it! Nice work."
    
    # ── L1 RESCUE ────────────────────────────────────────────
    l1_rescue:
      threshold: attempt_number >= 3 OR emotional_safety < 0.45
      method: acknowledge_l1_then_english_scaffold
      max_per_item: 1
      preference: >
        Prefer English phonological hint ("It starts with D") before L1 anchor
    
    # ── COGNITIVE LOAD MANAGEMENT ────────────────────────────
    cognitive_load:
      max_new_items_per_session: 6
      new_to_review_ratio: "1:2"
      working_memory_buffer: 7_items

# ─────────────────────────────────────────────────────────────
# TRANSITION HANDLING
# ─────────────────────────────────────────────────────────────
transition_rules:
  description: >
    A child at exactly age 7 turning 8 should not suddenly face a profile switch.
    Profile transitions should be gradual and observable.
  implementation:
    - age_band is set at registration and reviewed each academic year
    - Profile can be manually upgraded by teacher/parent review
    - If engagement_level or production_confidence in child profile significantly
      exceeds 6-7 norms, flag for review and consider profile upgrade
    - Never auto-downgrade; only upgrade should be automatic if warranted
